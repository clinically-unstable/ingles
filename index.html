<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Golden Dawn</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@100;300;400;700;900&family=Share+Tech+Mono&family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet"/>
</head>
<body>

  <nav class="nav">
    <div class="nav-logo">
      <span class="logo-mark">◈</span>
      <div class="logo-bars">
        <div class="logo-bar bar-long"></div>
        <div class="logo-bar bar-short"></div>
      </div>
    </div>
    <ul class="nav-links">
      <li><a href="#about" class="nav-dot"></a></li>
      <li><a href="#services" class="nav-dot"></a></li>
      <li><a href="#citizens" class="nav-dot"></a></li>
      <li><a href="#join" class="nav-cta"></a></li>
    </ul>
    <div class="nav-status">
      <span class="status-pip"></span>
    </div>
  </nav>

  <section class="hero" id="top">
    <div class="hero-rays"></div>
    <div class="hero-grid"></div>

    <div class="ticker-bar">
      <div class="ticker-inner">
        <span class="tick-gem">◆</span><span class="tick-dash"></span>
        <span class="tick-gem">◆</span><span class="tick-dash"></span>
        <span class="tick-gem">◆</span><span class="tick-dash"></span>
        <span class="tick-gem">◆</span><span class="tick-dash"></span>
        <span class="tick-gem">◆</span><span class="tick-dash"></span>
        <span class="tick-gem">◆</span><span class="tick-dash"></span>
        <span class="tick-gem">◆</span><span class="tick-dash"></span>
        <span class="tick-gem">◆</span><span class="tick-dash"></span>
        <span class="tick-gem">◆</span><span class="tick-dash"></span>
        <span class="tick-gem">◆</span><span class="tick-dash"></span>
        <span class="tick-gem">◆</span><span class="tick-dash"></span>
        <span class="tick-gem">◆</span><span class="tick-dash"></span>
      </div>
    </div>

    <div class="hero-body">
      <div class="kicker-bar"></div>
      <div class="hero-title-block">
        <div class="title-bar tb-xl"></div>
        <div class="title-bar tb-accent"></div>
        <div class="title-bar tb-large"></div>
      </div>
      <div class="hero-sub-block">
        <div class="sub-line sl-full"></div>
        <div class="sub-line sl-full"></div>
        <div class="sub-line sl-three-q"></div>
      </div>
      <div class="hero-actions">
        <div class="btn-filled"></div>
        <div class="btn-outline"></div>
      </div>
    </div>

    <div class="stat-row">
      <div class="stat-cell">
        <div class="sn-bar sn-xl"></div>
        <div class="sl-bar"></div>
      </div>
      <div class="stat-div"></div>
      <div class="stat-cell">
        <div class="sn-bar sn-md"></div>
        <div class="sl-bar sl-short"></div>
      </div>
      <div class="stat-div"></div>
      <div class="stat-cell">
        <div class="sn-bar sn-sm"></div>
        <div class="sl-bar sl-long"></div>
      </div>
    </div>

    <div class="hero-orb-wrap">
      <div class="orb-ring ring-a"></div>
      <div class="orb-ring ring-b"></div>
      <div class="orb-ring ring-c"></div>
      <div class="orb-core">
        <div class="orb-pupil"></div>
      </div>
    </div>
  </section>

  <div class="divider-band">
    <div class="band-line"></div>
    <div class="band-gems">
      <span>◈</span><span>◈</span><span>◈</span><span>◈</span><span>◈</span>
    </div>
    <div class="band-line"></div>
  </div>

  <section class="about" id="about">
    <div class="section-label-bar"></div>
    <div class="about-grid">
      <div class="about-text-col">
        <div class="heading-group">
          <div class="hg-bar hg-wide"></div>
          <div class="hg-bar hg-accent"></div>
          <div class="hg-bar hg-medium"></div>
        </div>
        <div class="para-group">
          <div class="pg-line pg-full"></div>
          <div class="pg-line pg-full"></div>
          <div class="pg-line pg-three-q"></div>
          <div class="pg-line pg-full"></div>
          <div class="pg-line pg-half"></div>
        </div>
        <div class="feature-list">
          <div class="feat-item">
            <div class="feat-dot"></div>
            <div class="feat-bar fb-long"></div>
          </div>
          <div class="feat-item">
            <div class="feat-dot"></div>
            <div class="feat-bar fb-medium"></div>
          </div>
          <div class="feat-item">
            <div class="feat-dot"></div>
            <div class="feat-bar fb-long"></div>
          </div>
          <div class="feat-item">
            <div class="feat-dot"></div>
            <div class="feat-bar fb-short"></div>
          </div>
        </div>
      </div>
      <div class="about-visual-col">
        <div class="geo-rings">
          <div class="geo-ring gr-1"></div>
          <div class="geo-ring gr-2"></div>
          <div class="geo-ring gr-3"></div>
          <div class="geo-center">◉</div>
        </div>
        <div class="score-panel">
          <svg viewBox="0 0 200 200" class="dial-svg">
            <circle cx="100" cy="100" r="78" class="dial-track"/>
            <circle cx="100" cy="100" r="78" class="dial-progress"/>
          </svg>
          <div class="dial-label-bar"></div>
          <div class="dial-sublabel-bar"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="services" id="services">
    <div class="section-label-bar slb-centered"></div>
    <div class="section-heading-centered">
      <div class="hg-bar hg-wide centered-bar"></div>
      <div class="hg-bar hg-accent centered-bar"></div>
    </div>
    <div class="cards-grid">

      <div class="card">
        <div class="card-icon">◎</div>
        <div class="card-title-bar"></div>
        <div class="card-lines">
          <div class="cl-line cl-full"></div>
          <div class="cl-line cl-full"></div>
          <div class="cl-line cl-half"></div>
        </div>
        <div class="card-footer-bar"></div>
      </div>

      <div class="card card-hero">
        <div class="card-shine"></div>
        <div class="card-icon ci-gold">◉</div>
        <div class="card-title-bar ctb-gold"></div>
        <div class="card-lines">
          <div class="cl-line cl-full"></div>
          <div class="cl-line cl-full"></div>
          <div class="cl-line cl-three-q"></div>
        </div>
        <div class="card-footer-bar cfb-gold"></div>
      </div>

      <div class="card">
        <div class="card-icon">✦</div>
        <div class="card-title-bar"></div>
        <div class="card-lines">
          <div class="cl-line cl-full"></div>
          <div class="cl-line cl-three-q"></div>
          <div class="cl-line cl-half"></div>
        </div>
        <div class="card-footer-bar"></div>
      </div>

      <div class="card">
        <div class="card-icon">▣</div>
        <div class="card-title-bar"></div>
        <div class="card-lines">
          <div class="cl-line cl-full"></div>
          <div class="cl-line cl-full"></div>
          <div class="cl-line cl-half"></div>
        </div>
        <div class="card-footer-bar"></div>
      </div>

      <div class="card">
        <div class="card-icon">⬡</div>
        <div class="card-title-bar"></div>
        <div class="card-lines">
          <div class="cl-line cl-full"></div>
          <div class="cl-line cl-three-q"></div>
          <div class="cl-line cl-full"></div>
        </div>
        <div class="card-footer-bar"></div>
      </div>

      <div class="card">
        <div class="card-icon">◐</div>
        <div class="card-title-bar"></div>
        <div class="card-lines">
          <div class="cl-line cl-full"></div>
          <div class="cl-line cl-half"></div>
          <div class="cl-line cl-three-q"></div>
        </div>
        <div class="card-footer-bar"></div>
      </div>

    </div>
  </section>

  <div class="divider-band">
    <div class="band-line"></div>
    <div class="band-gems">
      <span>◈</span><span>◈</span><span>◈</span><span>◈</span><span>◈</span>
    </div>
    <div class="band-line"></div>
  </div>

  <section class="citizens" id="citizens">
    <div class="section-label-bar slb-centered"></div>
    <div class="section-heading-centered">
      <div class="hg-bar hg-wide centered-bar"></div>
      <div class="hg-bar hg-accent centered-bar"></div>
    </div>
    <div class="citizens-grid">

      <div class="citizen-card">
        <div class="cc-quote-lines">
          <div class="cql cql-full"></div>
          <div class="cql cql-full"></div>
          <div class="cql cql-three-q"></div>
        </div>
        <div class="cc-author">
          <div class="cc-avatar av-a">K</div>
          <div class="cc-meta">
            <div class="ccm-bar ccm-name"></div>
            <div class="ccm-bar ccm-role"></div>
          </div>
          <div class="cc-badge">✓</div>
        </div>
        <div class="cc-meters">
          <div class="ccm-row">
            <div class="ccmr-label"></div>
            <div class="ccmr-track"><div class="ccmr-fill" style="width:97%"></div></div>
          </div>
          <div class="ccm-row">
            <div class="ccmr-label"></div>
            <div class="ccmr-track"><div class="ccmr-fill" style="width:100%"></div></div>
          </div>
        </div>
      </div>

      <div class="citizen-card citizen-star">
        <div class="star-badge">★</div>
        <div class="cc-quote-lines">
          <div class="cql cql-full"></div>
          <div class="cql cql-full"></div>
          <div class="cql cql-full"></div>
          <div class="cql cql-half"></div>
        </div>
        <div class="cc-author">
          <div class="cc-avatar av-b">M</div>
          <div class="cc-meta">
            <div class="ccm-bar ccm-name"></div>
            <div class="ccm-bar ccm-role"></div>
          </div>
          <div class="cc-badge">✓</div>
        </div>
        <div class="cc-meters">
          <div class="ccm-row">
            <div class="ccmr-label"></div>
            <div class="ccmr-track"><div class="ccmr-fill" style="width:100%"></div></div>
          </div>
          <div class="ccm-row">
            <div class="ccmr-label"></div>
            <div class="ccmr-track"><div class="ccmr-fill" style="width:100%"></div></div>
          </div>
        </div>
      </div>

      <div class="citizen-card">
        <div class="cc-quote-lines">
          <div class="cql cql-full"></div>
          <div class="cql cql-three-q"></div>
          <div class="cql cql-full"></div>
        </div>
        <div class="cc-author">
          <div class="cc-avatar av-c">R</div>
          <div class="cc-meta">
            <div class="ccm-bar ccm-name"></div>
            <div class="ccm-bar ccm-role"></div>
          </div>
          <div class="cc-badge badge-warn">⚠</div>
        </div>
        <div class="cc-meters">
          <div class="ccm-row">
            <div class="ccmr-label"></div>
            <div class="ccmr-track"><div class="ccmr-fill fill-warn" style="width:41%"></div></div>
          </div>
          <div class="ccm-row">
            <div class="ccmr-label"></div>
            <div class="ccmr-track"><div class="ccmr-fill fill-warn" style="width:65%"></div></div>
          </div>
        </div>
      </div>

    </div>
  </section>

  <section class="join" id="join">
    <div class="join-glow"></div>
    <div class="join-inner">
      <div class="join-kicker-bar"></div>
      <div class="join-heading">
        <div class="hg-bar hg-wide centered-bar"></div>
        <div class="hg-bar hg-accent centered-bar"></div>
      </div>
      <div class="join-sub">
        <div class="sub-line sl-full"></div>
        <div class="sub-line sl-three-q"></div>
      </div>
      <div class="form-shell">
        <div class="fs-row">
          <div class="fs-field"></div>
          <div class="fs-field"></div>
        </div>
        <div class="fs-row">
          <div class="fs-field"></div>
          <div class="fs-field fs-select-field"></div>
        </div>
        <div class="fs-check-row">
          <div class="fs-checkbox"></div>
          <div class="fs-check-lines">
            <div class="fscl-line fscl-full"></div>
            <div class="fscl-line fscl-three-q"></div>
          </div>
        </div>
        <div class="fs-check-row">
          <div class="fs-checkbox"></div>
          <div class="fs-check-lines">
            <div class="fscl-line fscl-full"></div>
            <div class="fscl-line fscl-half"></div>
          </div>
        </div>
        <div class="fs-submit-btn"></div>
        <div class="fs-fine-print">
          <div class="fp-line fp-full"></div>
          <div class="fp-line fp-three-q"></div>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="footer-inner">
      <div class="footer-brand">
        <span class="footer-gem">◈</span>
        <div class="footer-brand-bars">
          <div class="fbb-line fbb-long"></div>
          <div class="fbb-line fbb-short"></div>
        </div>
      </div>
      <div class="footer-cols">
        <div class="footer-col">
          <div class="fc-head"></div>
          <div class="fc-link"></div>
          <div class="fc-link fcl-s"></div>
          <div class="fc-link"></div>
        </div>
        <div class="footer-col">
          <div class="fc-head"></div>
          <div class="fc-link fcl-s"></div>
          <div class="fc-link"></div>
          <div class="fc-link fcl-s"></div>
        </div>
        <div class="footer-col">
          <div class="fc-head"></div>
          <div class="fc-link"></div>
          <div class="fc-link fcl-s"></div>
          <div class="fc-link"></div>
        </div>
      </div>
    </div>
    <div class="footer-bottom">
      <div class="fb-copy"></div>
      <div class="fb-monitor">
        <div class="monitor-dot"></div>
        <div class="monitor-bar"></div>
      </div>
    </div>
  </footer>

</body>
</html>
